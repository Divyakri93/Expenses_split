services:
  - type: web
    name: fairshare-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fairshare-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://fairshare-frontend.onrender.com

  - type: web
    name: fairshare-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fairshare-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: fairshare-db
    databaseName: fairshare
    user: admin
