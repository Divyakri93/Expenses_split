services:
  - type: web
    name: fairshare-expenses
    env: node
    region: ohio
    buildCommand: "cd backend && npm install && cd ../frontend && npm install && npm run build"
    startCommand: "cd backend && node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fairshare-db
          property: connectionString

databases:
  - name: fairshare-db
    databaseName: fairshare
    user: admin
